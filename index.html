// ─── Simplex-like noise ───────────────────────────────────────────────────────
class Noise {
    constructor(seed = 42) {
        this.p = new Uint8Array(512);
        const base = new Uint8Array(256);
        for (let i = 0; i < 256; i++) base[i] = i;
        let s = seed;
        for (let i = 255; i > 0; i--) {
            s = (s * 1664525 + 1013904223) >>> 0;
            const j = s % (i + 1);
            [base[i], base[j]] = [base[j], base[i]];
        }
        for (let i = 0; i < 512; i++) this.p[i] = base[i & 255];
    }
    fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    lerp(a, b, t) { return a + t * (b - a); }
    grad(hash, x, y, z) {
        const h = hash & 15;
        const u = h < 8 ? x : y, v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
        return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
    }
    perlin(x, y, z) {
        const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
        x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
        const u = this.fade(x), v = this.fade(y), w = this.fade(z);
        const p = this.p;
        const A = p[X]+Y, AA = p[A]+Z, AB = p[A+1]+Z;
        const B = p[X+1]+Y, BA = p[B]+Z, BB = p[B+1]+Z;
        return this.lerp(
            this.lerp(this.lerp(this.grad(p[AA],x,y,z),   this.grad(p[BA],x-1,y,z),   u),
                      this.lerp(this.grad(p[AB],x,y-1,z), this.grad(p[BB],x-1,y-1,z), u), v),
            this.lerp(this.lerp(this.grad(p[AA+1],x,y,z-1), this.grad(p[BA+1],x-1,y,z-1), u),
                      this.lerp(this.grad(p[AB+1],x,y-1,z-1), this.grad(p[BB+1],x-1,y-1,z-1), u), v), w
        );
    }
    octave(x, y, z, octs = 4, persistence = 0.5, lacunarity = 2.0) {
        let val = 0, amp = 1, freq = 1, max = 0;
        for (let i = 0; i < octs; i++) {
            val += this.perlin(x * freq, y * freq, z * freq) * amp;
            max += amp; amp *= persistence; freq *= lacunarity;
        }
        return val / max;
    }
}

// ─── Marching Cubes mesher ────────────────────────────────────────────────────
function marchChunk(densityFn, ox, oy, oz, size, isoLevel) {
    const N = size + 1;
    const verts = [], norms = [], cols = [];

    const density = new Float32Array(N * N * N);
    const idx = (x, y, z) => x * N * N + y * N + z;

    for (let x = 0; x < N; x++)
    for (let y = 0; y < N; y++)
    for (let z = 0; z < N; z++)
        density[idx(x,y,z)] = densityFn(ox+x, oy+y, oz+z);

    const edgeVert = (x0,y0,z0, x1,y1,z1) => {
        const d0 = density[idx(x0,y0,z0)], d1 = density[idx(x1,y1,z1)];
        const t = (isoLevel - d0) / (d1 - d0 + 1e-9);
        return [x0 + t*(x1-x0), y0 + t*(y1-y0), z0 + t*(z1-z0)];
    };

    for (let x = 0; x < size; x++)
    for (let y = 0; y < size; y++)
    for (let z = 0; z < size; z++) {
        const corners = [
            density[idx(x,  y,  z  )], density[idx(x+1,y,  z  )],
            density[idx(x+1,y,  z+1)], density[idx(x,  y,  z+1)],
            density[idx(x,  y+1,z  )], density[idx(x+1,y+1,z  )],
            density[idx(x+1,y+1,z+1)], density[idx(x,  y+1,z+1)]
        ];
        let cubeIdx = 0;
        for (let i = 0; i < 8; i++) if (corners[i] < isoLevel) cubeIdx |= (1 << i);
        if (edgeTable[cubeIdx] === 0) continue;

        const edgePts = [null,null,null,null,null,null,null,null,null,null,null,null];
        const e = edgeTable[cubeIdx];
        if (e & 1)    edgePts[0]  = edgeVert(x,y,z,     x+1,y,z);
        if (e & 2)    edgePts[1]  = edgeVert(x+1,y,z,   x+1,y,z+1);
        if (e & 4)    edgePts[2]  = edgeVert(x,y,z+1,   x+1,y,z+1);
        if (e & 8)    edgePts[3]  = edgeVert(x,y,z,     x,y,z+1);
        if (e & 16)   edgePts[4]  = edgeVert(x,y+1,z,   x+1,y+1,z);
        if (e & 32)   edgePts[5]  = edgeVert(x+1,y+1,z, x+1,y+1,z+1);
        if (e & 64)   edgePts[6]  = edgeVert(x,y+1,z+1, x+1,y+1,z+1);
        if (e & 128)  edgePts[7]  = edgeVert(x,y+1,z,   x,y+1,z+1);
        if (e & 256)  edgePts[8]  = edgeVert(x,y,z,     x,y+1,z);
        if (e & 512)  edgePts[9]  = edgeVert(x+1,y,z,   x+1,y+1,z);
        if (e & 1024) edgePts[10] = edgeVert(x+1,y,z+1, x+1,y+1,z+1);
        if (e & 2048) edgePts[11] = edgeVert(x,y,z+1,   x,y+1,z+1);

        const tris = triTable[cubeIdx];
        for (let t = 0; t < tris.length; t += 3) {
            const p0 = edgePts[tris[t]],
                  p1 = edgePts[tris[t+1]],
                  p2 = edgePts[tris[t+2]];
            // flat normal
            const ax=p1[0]-p0[0],ay=p1[1]-p0[1],az=p1[2]-p0[2];
            const bx=p2[0]-p0[0],by=p2[1]-p0[1],bz=p2[2]-p0[2];
            const nx=ay*bz-az*by, ny=az*bx-ax*bz, nz=ax*by-ay*bx;
            const len=Math.sqrt(nx*nx+ny*ny+nz*nz)+1e-9;
            for (let k = 0; k < 3; k++) {
                const pt = [p0, p1, p2][k];
                verts.push(ox + pt[0], oy + pt[1], oz + pt[2]);
                norms.push(nx/len, ny/len, nz/len);
                // color by world-Y height
                const worldY = oy + pt[1];
                if (worldY < 4)       cols.push(0.24, 0.45, 0.90); // deep water
                else if (worldY < 8)  cols.push(0.76, 0.70, 0.50); // sand
                else if (worldY < 20) cols.push(0.25, 0.55, 0.25); // grass
                else if (worldY < 28) cols.push(0.40, 0.35, 0.30); // rock
                else                  cols.push(0.95, 0.95, 1.00); // snow
            }
        }
    }
    return { verts, norms, cols };
}

// ─── World / Chunk management ─────────────────────────────────────────────────
const noise   = new Noise(12345);
const ISO     = 0.0;
const CHUNK   = 16;
const RENDER  = 3;          // render radius in chunks
const chunks  = new Map();
const mat     = new THREE.MeshLambertMaterial({ vertexColors: true });

function densityAt(wx, wy, wz) {
    // surface height via noise
    const scale = 0.035;
    const h = 14
        + noise.octave(wx * scale, 0, wz * scale, 5, 0.55, 2.1) * 22
        + noise.octave(wx * 0.008, 0, wz * 0.008, 2, 0.5, 2.0) * 20;
    // density: negative above surface, positive below
    return (h - wy) / 10.0;
}

function buildChunk(cx, cy, cz) {
    const key = `${cx},${cy},${cz}`;
    if (chunks.has(key)) return;
    const ox = cx * CHUNK, oy = cy * CHUNK, oz = cz * CHUNK;
    const {verts, norms, cols} = marchChunk(densityAt, ox, oy, oz, CHUNK, ISO);
    if (verts.length === 0) { chunks.set(key, null); return; }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setAttribute('normal',   new THREE.Float32BufferAttribute(norms, 3));
    geo.setAttribute('color',    new THREE.Float32BufferAttribute(cols,  3));
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = mesh.receiveShadow = true;
    scene.add(mesh);
    chunks.set(key, mesh);
}

function removeChunk(key) {
    const mesh = chunks.get(key);
    if (mesh) { scene.remove(mesh); mesh.geometry.dispose(); }
    chunks.delete(key);
}

let lastCX = null, lastCY = null, lastCZ = null;
function updateChunks() {
    const cx = Math.floor(camera.position.x / CHUNK);
    const cy = Math.floor(camera.position.y / CHUNK);
    const cz = Math.floor(camera.position.z / CHUNK);
    if (cx === lastCX && cy === lastCY && cz === lastCZ) return;
    lastCX = cx; lastCY = cy; lastCZ = cz;

    // remove far chunks
    for (const key of chunks.keys()) {
        const [kx,ky,kz] = key.split(',').map(Number);
        if (Math.abs(kx-cx) > RENDER+1 || Math.abs(ky-cy) > RENDER+1 || Math.abs(kz-cz) > RENDER+1)
            removeChunk(key);
    }

    // schedule near chunks
    const queue = [];
    for (let dx = -RENDER; dx <= RENDER; dx++)
    for (let dy = -2; dy <= RENDER; dy++)
    for (let dz = -RENDER; dz <= RENDER; dz++) {
        const key = `${cx+dx},${cy+dy},${cz+dz}`;
        if (!chunks.has(key)) queue.push([cx+dx, cy+dy, cz+dz, dx*dx+dy*dy+dz*dz]);
    }
    queue.sort((a,b) => a[3]-b[3]);
    let built = 0;
    for (const [qx,qy,qz] of queue) {
        buildChunk(qx, qy, qz);
        if (++built >= 4) break; // limit per frame
    }
}

// ─── Player controls ──────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup',   e => keys[e.code] = false);

let yaw = 0, pitch = 0, locked = false;
const lockedMsg = document.getElementById('locked-msg');
const info      = document.getElementById('info');

document.addEventListener('pointerlockchange', () => {
    locked = document.pointerLockElement === renderer.domElement;
    info.style.display      = locked ? 'none' : '';
    lockedMsg.style.display = 'none';
});

renderer.domElement.addEventListener('click', () => {
    renderer.domElement.requestPointerLock();
});

document.addEventListener('mousemove', e => {
    if (!locked) return;
    yaw   -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2+0.01, Math.min(Math.PI/2-0.01, pitch));
});

// ─── Render loop ──────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const posEl = document.getElementById('pos');
const quat  = new THREE.Quaternion();
const euler = new THREE.Euler(0, 0, 0, 'YXZ');

// Build initial chunks synchronously so world is visible on first frame
lockedMsg.style.display = 'block';
lockedMsg.textContent   = 'Generating world…';
for (let dx = -RENDER; dx <= RENDER; dx++)
for (let dy = -2; dy <= RENDER; dy++)
for (let dz = -RENDER; dz <= RENDER; dz++)
    buildChunk(dx, dy, dz);
lockedMsg.style.display = 'none';

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    euler.set(pitch, yaw, 0);
    camera.quaternion.setFromEuler(euler);

    if (locked) {
        const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? 30 : 12;
        const fwd   = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        const right = new THREE.Vector3(1, 0,  0).applyQuaternion(camera.quaternion);
        fwd.y = 0; fwd.normalize();
        right.y = 0; right.normalize();
        if (keys['KeyW']) camera.position.addScaledVector(fwd,   speed * dt);
        if (keys['KeyS']) camera.position.addScaledVector(fwd,  -speed * dt);
        if (keys['KeyA']) camera.position.addScaledVector(right, -speed * dt);
        if (keys['KeyD']) camera.position.addScaledVector(right,  speed * dt);
        if (keys['Space'])   camera.position.y += speed * dt;
        if (keys['ShiftLeft'] && !keys['KeyW'] && !keys['KeyS']) camera.position.y -= speed * dt;
    }

    updateChunks();

    const p = camera.position;
    posEl.textContent = `Position: ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
