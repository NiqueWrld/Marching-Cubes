<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marching Cubes World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overflow: hidden; }
        canvas { display: block; }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute;
            background: rgba(255,255,255,0.7);
        }
        #crosshair::before { width: 2px; height: 100%; left: 9px; top: 0; }
        #crosshair::after  { width: 100%; height: 2px; top: 9px; left: 0; }
        #ui h1 { text-shadow: 0 0 8px #0ff; }
        #ui p  { text-shadow: 0 0 8px #0ff; }
        /* Auth UI */
        #auth-panel { pointer-events: all; }
        #sign-in-btn { background: #4285F4; }
        #sign-in-btn:hover { background: #357ae8; }
        #user-photo { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body class="bg-black font-mono">
<div id="ui" class="fixed top-4 left-4 pointer-events-none select-none text-cyan-400">
    <h1 class="text-lg mb-2 tracking-widest">MARCHING CUBES</h1>
    <p id="pos" class="text-xs leading-relaxed opacity-80">Position: 0, 0, 0</p>
    <p class="text-xs leading-relaxed opacity-80">WASD &ndash; Move &nbsp; Space &ndash; Jump &nbsp; Shift &ndash; Sprint</p>
    <p class="text-xs leading-relaxed opacity-80">Mouse &ndash; Look &nbsp; Click &ndash; Lock cursor</p>

    <!-- Auth panel -->
    <div id="auth-panel" class="mt-3 flex items-center gap-2">
        <button id="sign-in-btn"
            class="flex items-center gap-2 text-white text-xs px-3 py-1.5 rounded shadow font-semibold">
            <svg class="w-4 h-4" viewBox="0 0 48 48"><path fill="#fff" d="M44.5 20H24v8.5h11.7C34.1 33.9 29.6 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6-6C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.8 20-21 0-1.4-.1-2.7-.5-4z"/></svg>
            Sign in with Google
        </button>
        <div id="user-info" style="display:none" class="flex items-center gap-2">
            <img id="user-photo" src="" alt="avatar" />
            <span id="user-name" class="text-xs text-cyan-300"></span>
            <button id="sign-out-btn" class="text-xs text-white/50 hover:text-white underline">Sign out</button>
        </div>
    </div>
</div>
<div id="crosshair" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-5 h-5 pointer-events-none"></div>
<div id="info" class="fixed bottom-4 left-1/2 -translate-x-1/2 text-white/50 text-xs pointer-events-none">Click to capture mouse</div>
<div id="locked-msg" style="display:none" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white text-xl text-center bg-black/70 px-10 py-6 rounded-lg border border-white/20">Loading world...</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
