<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In – Marching Cubes World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; }
        .glow { text-shadow: 0 0 12px #22d3ee, 0 0 30px #22d3ee55; }
        .card-glow { box-shadow: 0 0 40px #0891b220, 0 0 80px #0e748820; }
        .btn-google:hover { filter: brightness(1.1); }
        .scanline {
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
            );
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-950 min-h-screen flex flex-col items-center justify-center overflow-hidden relative">

    <!-- Background terrain visual -->
    <div class="absolute inset-0 opacity-20">
        <svg viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice" class="w-full h-full">
            <defs>
                <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#0ea5e9" />
                    <stop offset="100%" stop-color="#0c4a6e" />
                </linearGradient>
            </defs>
            <rect width="1200" height="400" fill="url(#sky)" />
            <polygon points="0,280 120,180 240,230 380,120 520,200 650,140 780,190 900,110 1050,170 1200,130 1200,400 0,400"
                fill="#1e3a1e" />
            <polygon points="0,320 100,270 220,300 350,240 480,290 600,250 720,280 850,230 980,270 1100,240 1200,260 1200,400 0,400"
                fill="#14532d" />
        </svg>
    </div>
    <div class="scanline absolute inset-0"></div>

    <!-- Card -->
    <div class="relative z-10 card-glow bg-gray-900/80 backdrop-blur border border-cyan-900/60 rounded-2xl px-10 py-12 flex flex-col items-center gap-6 w-full max-w-sm">

        <!-- Logo / title -->
        <div class="flex flex-col items-center gap-1">
            <div class="text-4xl mb-1">🌍</div>
            <h1 class="text-2xl tracking-widest text-cyan-400 glow uppercase">Marching Cubes</h1>
            <p class="text-xs text-cyan-600 tracking-widest">Open World Exploration</p>
        </div>

        <div class="w-full border-t border-cyan-900/40"></div>

        <!-- Status message -->
        <p id="status" class="text-xs text-cyan-500 min-h-[1.2rem] text-center"></p>

        <!-- Google Sign-In button -->
        <button id="sign-in-btn" onclick="signInWithGoogle()"
            class="btn-google w-full flex items-center justify-center gap-3 bg-white text-gray-800 font-semibold rounded-lg px-5 py-3 text-sm transition-all duration-150 shadow-lg">
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 48 48">
                <path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.1 33.9 29.6 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6-6C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.8 20-21 0-1.4-.1-2.7-.5-4z"/>
                <path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.1 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6-6C34.6 5.1 29.6 3 24 3c-7.8 0-14.6 4.5-18.7 11.7z"/>
                <path fill="#FBBC05" d="M24 45c5.5 0 10.5-1.9 14.4-5l-6.7-5.5C29.6 36.1 27 37 24 37c-5.6 0-10.1-3.1-11.7-7.5l-7 5.4C9.4 40.5 16.2 45 24 45z"/>
                <path fill="#EA4335" d="M44.5 20H24v8.5h11.7c-.8 2.3-2.3 4.2-4.3 5.5l6.7 5.5C41.9 36.1 45 30.5 45 24c0-1.4-.1-2.7-.5-4z"/>
            </svg>
            Continue with Google
        </button>

        <!-- Guest play -->
        <button id="guest-btn" onclick="playAsGuest()"
            class="w-full text-xs text-cyan-700 hover:text-cyan-400 transition-colors py-1 underline underline-offset-2">
            Play as guest (progress not saved)
        </button>

        <div class="w-full border-t border-cyan-900/40"></div>
        <p class="text-[10px] text-gray-600 text-center">Your position and world data are saved to your account.</p>
    </div>

    <!-- Firebase compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
